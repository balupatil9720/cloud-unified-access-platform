ubuntu@ip-10-0-1-4:~$ cat /etc/nginx/conf.d/app.conf
# -------------------------
# 🔧 WEBSOCKET SUPPORT (GLOBAL)
# -------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# -------------------------
# 🌐 MAIN SERVER (PORT 80)
# -------------------------
server {
    listen 80 default_server;
    server_name _;

    # -------------------------
    # 🔐 AUTH / DASHBOARD (NODE)
    # -------------------------
    location /login {
        proxy_pass http://127.0.0.1:3000;
    }

    location /dashboard {
        proxy_pass http://127.0.0.1:3000/dashboard;
    }

    location /logout {
        proxy_pass http://127.0.0.1:3000/logout;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# -------------------------
# 🎓 ODOO (PORT 8069)
# -------------------------
server {
    listen 8069;
    server_name _;

    location / {
        proxy_pass http://10.0.2.170:8069;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# -------------------------
# 📚 MOODLE (PORT 8080)
# -------------------------
server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass http://10.0.2.170:8082;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_redirect off;
    }
}
# -------------------------
# 🧠 ERPNext (PORT 8090) + WEBSOCKET
# -------------------------
server {
    listen 8090;
    server_name _;

    location / {
        proxy_pass http://10.0.2.170:8090;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 🔥 WEBSOCKET FIX
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}